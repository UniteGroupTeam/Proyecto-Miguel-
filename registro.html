<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Entrada | RED DE PUNTOS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.156.1/three.min.js"></script>
</head>
<body>
    <nav class="glass-nav">
        <a href="index.html" class="logo" style="text-decoration: none;">RED DE PUNTOS</a>
        <a href="index.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 600;">← VOLVER</a>
    </nav>

    <div id="three-container"></div>

    <div class="container">
        <form id="registration-form" class="glass-card fade-in">
            <h1 style="font-family: 'Outfit'; font-size: 2.5rem; margin-bottom: 3rem; text-align: center;">REGISTRO DE ENTRADA</h1>
            
            <!-- Datos del Cliente -->
            <section class="form-section">
                <h2>👤 DATOS DEL CLIENTE</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" name="nombre" placeholder="Ej. Carlos Slim" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono / WhatsApp</label>
                        <input type="tel" name="telefono" placeholder="10 dígitos" pattern="[0-9]{10}" required>
                    </div>
                </div>
            </section>

            <!-- Detalles del Calzado -->
            <section class="form-section">
                <h2>👟 DETALLES DEL CALZADO</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Marca</label>
                        <input type="text" name="marca" placeholder="Nike, Adidas, etc." required>
                    </div>
                    <div class="form-group">
                        <label>Modelo</label>
                        <input type="text" name="modelo" placeholder="Air Max, Jordan..." required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Color</label>
                        <input type="text" name="color" placeholder="Blanco/Gris" required>
                    </div>
                    <div class="form-group">
                        <label>Talla</label>
                        <input type="number" name="talla" placeholder="Ej. 28" step="0.5">
                    </div>
                </div>
                <div class="form-group">
                    <label>Estado Inicial / Notas</label>
                    <textarea name="estado" rows="3" placeholder="Describe manchas, desgastes o reparaciones específicas..."></textarea>
                </div>
            </section>

            <!-- Servicios -->
            <section class="form-section">
                <h2>✨ SERVICIOS SOLICITADOS</h2>
                <div class="checklist">
                    <label class="check-item">
                        <input type="checkbox" name="servicio" value="Limpieza Básica">
                        <span>Limpieza Básica</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" name="servicio" value="Restauración">
                        <span>Restauración</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" name="servicio" value="Desinfectado">
                        <span>Desinfectado</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" name="servicio" value="Repelente">
                        <span>Repelente</span>
                    </label>
                </div>
            </section>

            <!-- Ubicación -->
            <section class="form-section">
                <h2>📍 PUNTO DE ENTREGA</h2>
                <div class="form-group">
                    <select name="punto" required>
                        <option value="" disabled selected>Selecciona una ubicación</option>
                        <option value="Terminal 33">Terminal 33 (El Maratón)</option>
                        <option value="Punto Norte">Sucursal Norte</option>
                        <option value="Punto Centro">Sucursal Centro</option>
                    </select>
                </div>
            </section>

            <button type="submit" class="btn btn-submit">CONFIRMAR REGISTRO</button>
        </form>

        <!-- Success Modal -->
        <div id="success-modal" class="glass-card" style="display: none;">
            <div style="text-align: center;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
                <h2 style="font-family: 'Outfit'; font-size: 2rem; margin-bottom: 1rem; color: var(--secondary);">REGISTRO COMPLETADO</h2>
                <p style="font-size: 1.2rem; margin-bottom: 2rem;">Folio Generado: <strong id="folio-id" style="color: #fff;"></strong></p>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <a id="whatsapp-btn" href="#" target="_blank" class="btn btn-whatsapp">ENVIAR COMPROBANTE WHATSAPP</a>
                    <button onclick="location.reload()" class="btn" style="background: transparent; border: 1px solid var(--glass-border); color: #fff;">NUEVO REGISTRO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
